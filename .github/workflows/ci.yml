name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check
        run: |
          python -m compileall simulate.py src tests examples/run_ecommerce_adapter.py

      - name: Run unit tests
        run: |
          python -m pytest tests -v

      - name: Run experiment A (smoke test)
        run: |
          python experiments/experiment_A_baseline.py

      - name: Run simulate.py with example scenario
        run: |
          python simulate.py --config examples/scenario_refund_conflict.json --seed 42

      - name: Run adapter CLI smoke test
        run: |
          python examples/run_ecommerce_adapter.py --metrics examples/metrics_ecommerce_conflict.json --seed 42

      - name: Generate governance chain (ecommerce example)
        run: |
          python -m src.governance_chain generate --input examples/governance_chain/raw-input.ecommerce.json --out out/governance_chain

      - name: Validate governance chain artifacts
        run: |
          python -m src.governance_chain validate out/governance_chain

      - name: Run governance chain unit tests
        run: |
          python -m pytest tests/test_governance_chain.py -v
